<input type="text" placeholder="Filter by driver" #filterInput (input)="filterByDriver(filterInput.value)">

<table>
    <thead>
        <tr>
            <th>Driver</th>
            <th>Team</th>
            <th>Circuit</th>
            <th>Lap Time</th>
            <th>Date</th>
        </tr>
    </thead>
    <tbody>
        @for(lap of filteredLaps; track lap.id){
            <tr>
                <td>{{ lap.driver }}</td>
                <td>{{ lap.team }}</td>
                <td>{{ lap.circuit }}</td>
                <td>{{ lap.lapTime }}</td>
                <td>{{ lap.date }}</td>
            </tr>
        }
    </tbody>
</table>
