<input type="text" placeholder="Filter by driver, team or circuit" #filterInput (input)="filterLaps(filterInput.value)">
<button (click)="sortByLapTime()">Sort By Lap Time</button>

<table>
    <thead>
        <tr>
            <th>Driver</th>
            <th>Team</th>
            <th>Circuit</th>
            <th>Lap Time</th>
            <th>Date</th>
            <th></th>
        </tr>
    </thead>
    <tbody>
        @for(lap of filteredLaps; track lap.id){
            <tr (click)="goToDetail(lap.id)" style="cursor: pointer"
                [ngClass]="{'best-lap': lap.lapTime === bestLapTime}">
                <td>{{ lap.driver }}</td>
                <td>{{ lap.team }}</td>
                <td>{{ lap.circuit }}</td>
                <td>{{ lap.lapTime | lapTimeFormat }}</td>
                <td>{{ lap.date }}</td>
                <td><button class="delete-btn" (click)="deleteLap($event, lap.id)">Delete lap</button></td>
            </tr>
        }
    </tbody>
</table>
