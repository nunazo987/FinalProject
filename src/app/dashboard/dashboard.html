<div class="dashboard-container">
<h2> 2026 Season Testing Overview</h2>

<div class="kpis">
    <app-kpi-card title="Total Laps" [value]="totalLaps.toString()" />
    <app-kpi-card title="Best Lap" [value]="bestLap ? bestLap.driver + ' — ' + (bestLap.lapTime | lapTimeFormat) : 'No data'" />
    <app-kpi-card title="Average Lap Time" [value]="averageLapTime ? (averageLapTime | lapTimeFormat) : 'No data'" />

    <div class="kpi-card">
        <h3>Last Lap Added</h3>
        @if (lastLap) {
            <div class="last-lap">
                <p>Driver: {{ lastLap.driver }}</p>
                <p>Team: {{ lastLap.team }}</p>
                <p>Circuit: {{ lastLap.circuit }}</p>
                <p>Lap Time: {{ lastLap.lapTime }}s</p>
                <p>Date: {{ lastLap.date }}</p>
            </div>
        } @else {
            <p>No lap added yet.</p>
        } 
    </div>
</div>
</div>
